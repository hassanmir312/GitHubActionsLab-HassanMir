name: Multi Platform Testing

on:
  pull_request:
    branches:
      - master

jobs:
  ubuntu-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print OS info
        run: uname -a

      - name: Create file
        run: echo "Hello from Ubuntu" > ubuntu.txt

      - name: Display file contents
        run: cat ubuntu.txt

  windows-job:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print system info
        run: systeminfo

      - name: Create file
        run: echo Hello from Windows > windows.txt

      - name: Display file contents
        run: type windows.txt

  macos-job:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print OS info
        run: uname -a

      - name: Create file
        run: echo "Hello from macOS" > macos.txt

      - name: Display file contents
        run: cat macos.txt
